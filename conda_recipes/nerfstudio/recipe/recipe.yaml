tests:
- script:
  - python -c "import tinycudann"
  - python -c "import gsplat"
  - python -c "import pymeshlab"
  - ns-download-data --help
  - ns-process-data --help
  - ns-train --help
  - ns-train splatfacto --help
  - ns-train splatfacto-w --help
  - ns-train splatfacto-w-light --help
  - ns-export --help
  - ns-export gaussian-splat --help
  - ns-viewer --help
  - gsplat_simple_trainer --help
  - gsplat_simple_trainer mcmc --help

about:
  homepage: https://docs.nerf.studio/
  license: Apache-2.0
  summary: >
    Nerfstudio provides a simple API that allows for a simplified end-to-end process of creating, training,
    and testing NeRFs. The library supports a more interpretable implementation of NeRFs by modularizing
    each component. With more modular NeRFs, we hope to create a more user-friendly experience in exploring
    the technology.
