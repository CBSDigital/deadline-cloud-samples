    ## From tyro
    - typeguard >=4.4.2

    ## From gsplat simple_trainer.py
#    - pycolmap
    - imageio-ffmpeg >=0.6,<0.7
    - psutil >=7.0,<7.1

    ## From viser
    - websockets >=15.0,<15.1
    - msgspec >=0.19.0,<0.20
    - nodeenv >=1.9,<1.10
